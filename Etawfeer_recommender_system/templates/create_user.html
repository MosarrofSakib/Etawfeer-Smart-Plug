{% extends 'base.html' %} {% block title %}Create User - E-Tawfeer Recommender
System{% endblock %} {% block content %}
<div class="flex justify-center mt-10">
  <div
    class="w-full max-w-3xl bg-gray-100 border border-gray-300 shadow-lg rounded-lg p-6"
  >
    <!-- Back Button -->
    <div class="flex items-center mb-4">
      <a
        href="{{ get_url('user_bp.users') }}"
        class="text-gray-600 hover:text-black flex items-center"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="h-6 w-6 mr-2"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M15 19l-7-7 7-7"
          />
        </svg>
        Back
      </a>
    </div>

    <h1 class="text-2xl font-bold text-center mb-4">Create New User</h1>
    <form
      action="{{ get_url('user_bp.create_user') }}"
      method="post"
      class="w-full"
    >
      <!-- Name -->
      <div class="mb-2">
        <label for="name" class="block font-medium">Name:</label>
        <input
          type="text"
          id="name"
          name="name"
          required
          class="w-full p-2 border border-gray-300 rounded"
        />
      </div>

      <!-- Device Selection from HA Notify Services -->
      <div class="mb-2">
        <label for="device" class="block font-medium">Device:</label>
        <select
          id="device"
          name="device"
          required
          class="w-full p-2 border border-gray-300 rounded"
        >
          <option value="" disabled selected>Select a device</option>
          {% for device in notify %}
          <option value="{{ device }}">{{ device }}</option>
          {% endfor %}
        </select>
      </div>

      <!-- Country Dropdown -->
      <div class="mb-2">
        <label for="country" class="block font-medium">Country:</label>
        <select
          id="country"
          name="country"
          required
          class="w-full p-2 border border-gray-300 rounded"
        >
          <option value="Qatar" selected>Qatar</option>
        </select>
      </div>

      <!-- Submit Button -->
      <input
        type="submit"
        value="Create User"
        class="w-full bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded cursor-pointer"
      />
    </form>
  </div>
</div>
{% endblock %}
